<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>卫星轨迹预测与可视性分析系统</title>
    <link href="./Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="./Cesium/Cesium.js"></script>
    <script>window.CESIUM_BASE_URL = './Cesium/';</script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        body, html, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 8px;
            color: white; width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .transit-table { margin-top: 10px; background: transparent !important; }
        .el-table { --el-table-bg-color: transparent; --el-table-tr-bg-color: transparent; color: #eee; }
        h4 { margin: 10px 0 5px 0; color: #409EFF; }
    </style>
</head>
<body>
    <div id="app">
        <div id="ui-panel">
            <h3>卫星分析系统</h3>

            <el-tabs type="border-card" style="background: transparent; border: none;">
                <el-tab-pane label="追踪与覆盖">
                    <div class="info-label">选择卫星</div>
                    <el-select v-model="selectedSatId" filterable @change="handleSatChange" style="width: 100%">
                        <el-option v-for="item in satelliteList" :key="item.id" :label="item.name" :value="item.id"></el-option>
                    </el-select>

                    <div v-if="currentInfo" class="info-card" style="margin-top:10px; font-size:13px;">
                        <p>经度: {{ currentInfo.subpoint.longitude.toFixed(2) }}° | 纬度: {{ currentInfo.subpoint.latitude.toFixed(2) }}°</p>
                        <p>覆盖面积: {{ (currentInfo.cover_area_sqkm/10000).toFixed(2) }} 万km²</p>
                    </div>
                </el-tab-pane>

                <el-tab-pane label="可视性预报">
                    <p style="font-size: 12px; color: #aaa;">提示：左键点击地球选择地面站位置</p>
                    <div style="margin-bottom: 10px;">
                        <el-tag type="success">站经度: {{ station.lon.toFixed(2) }}</el-tag>
                        <el-tag type="success" style="margin-left:5px;">站纬度: {{ station.lat.toFixed(2) }}</el-tag>
                    </div>
                    <el-button type="primary" size="small" @click="fetchTransit" :disabled="!selectedSatId" style="width:100%">
                        分析未来24小时过境
                    </el-button>

                    <el-table :data="transitList" size="small" class="transit-table" max-height="250">
                        <el-table-column prop="start_time" label="开始时间" width="140"></el-table-column>
                        <el-table-column prop="max_pitch_angle" label="最大仰角" width="80">
                            <template #default="scope">{{ scope.row.max_pitch_angle.toFixed(1) }}°</template>
                        </el-table-column>
                        <el-table-column label="持续(秒)">
                            <template #default="scope">{{ scope.row.target_timeliness }}</template>
                        </el-table-column>
                    </el-table>
                </el-tab-pane>
            </el-tabs>
        </div>
        <div id="cesiumContainer"></div>
    </div>

    <script>
        const { createApp, ref, onMounted, reactive } = Vue;

        createApp({
            setup() {
                const satelliteList = ref([]);
                const selectedSatId = ref('');
                const currentInfo = ref(null);
                const transitList = ref([]);
                const station = reactive({ lon: 121.47, lat: 31.23 }); // 默认上海

                let viewer, stationEntity, pathEntity, coverageEntity;

                const initCesium = () => {
                    viewer = new Cesium.Viewer('cesiumContainer', {
                        baseLayerPicker: false, geocoder: false,
                        baseLayer: new Cesium.ImageryLayer(new Cesium.OpenStreetMapImageryProvider({
                            url : 'https://a.tile.openstreetmap.org/'
                        }))
                    });
                    viewer.scene.requestRenderMode = true;

                    // 注册左键点击事件：选择地面站
                    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
                    handler.setInputAction((click) => {
                        const cartesian = viewer.camera.pickEllipsoid(click.position);
                        if (cartesian) {
                            const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                            station.lon = Cesium.Math.toDegrees(cartographic.longitude);
                            station.lat = Cesium.Math.toDegrees(cartographic.latitude);
                            updateStationMarker();
                        }
                    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
                };

                const updateStationMarker = () => {
                    if (stationEntity) viewer.entities.remove(stationEntity);
                    stationEntity = viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(station.lon, station.lat),
                        point: { pixelSize: 12, color: Cesium.Color.SPRINGGREEN, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 },
                        label: { text: '观测站', font: '12px sans-serif', verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -10) }
                    });
                    viewer.scene.requestRender();
                };

                const fetchTransit = async () => {
                    if (!selectedSatId.value) return;
                    try {
                        const url = `http://localhost:8000/api/satellite/transit?sat_id=${selectedSatId.value}&lon=${station.lon}&lat=${station.lat}`;
                        const res = await fetch(url);
                        transitList.value = await res.json();
                        if (transitList.value.length === 0) {
                            ElementPlus.ElMessage.warning('未来24小时内该卫星不会经过此站点上空');
                        }
                    } catch (e) {
                        ElementPlus.ElMessage.error('获取过境数据失败');
                    }
                };

                const handleSatChange = async (id) => {
                    const trajRes = await fetch(`http://localhost:8000/api/satellite/trajectory/${id}`);
                    const trajData = await trajRes.json();

                    if (pathEntity) viewer.entities.remove(pathEntity);
                    pathEntity = viewer.entities.add({
                        polyline: {
                            positions: trajData.map(p => Cesium.Cartesian3.fromDegrees(p.longitude, p.latitude, p.altitude * 1000)),
                            width: 2, material: Cesium.Color.GOLD
                        }
                    });

                    const covRes = await fetch(`http://localhost:8000/api/satellite/coverage/${id}`);
                    currentInfo.value = await covRes.json();

                    if (coverageEntity) viewer.entities.remove(coverageEntity);
                    coverageEntity = viewer.entities.add({
                        polygon: {
                            hierarchy: currentInfo.value.cover_range.map(p => Cesium.Cartesian3.fromDegrees(p.longitude, p.latitude)),
                            material: Cesium.Color.CYAN.withAlpha(0.3)
                        }
                    });

                    viewer.scene.requestRender();
                };

                const fetchList = async () => {
                    const res = await fetch('http://localhost:8000/api/satellites/list');
                    satelliteList.value = await res.json();
                };

                onMounted(() => {
                    initCesium();
                    fetchList();
                    updateStationMarker();
                });

                return { satelliteList, selectedSatId, handleSatChange, currentInfo, station, transitList, fetchTransit };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
